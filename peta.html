<style>
:root {
    --bg-parchment:#f5eedc;
    --paper-white:#fffdf9;
    --vintage-brown:#3e2723;
    --leather-dark:#271202;
    --accent-gold:#c6a664;
    --text-dark:#2b1d16;
    --text-muted:#5d4037;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Georgia','Times New Roman',serif;
    color:var(--text-dark);

    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.6), transparent 40%),
        radial-gradient(circle at bottom right, rgba(0,0,0,0.05), transparent 50%),
        url("https://www.transparenttextures.com/patterns/old-mathematics.png"),
        var(--bg-parchment);
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle, transparent 60%, rgba(0,0,0,0.15) 100%);
    pointer-events:none;
}

/* ================= NAVBAR ================= */
nav {
            background-color: var(--leather-dark);
            border-bottom: 3px solid var(--accent-gold);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            color: var(--bg-parchment);
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area span {
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: #d7ccc8;
            text-decoration: none;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 5px;
        }

/* ================= HERO ================= */
.hero{
    height:200px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;

    background:
        linear-gradient(rgba(39,18,2,0.75), rgba(39,18,2,0.85)),
        url("https://upload.wikimedia.org/wikipedia/commons/e/ea/Kuala_Lumpur_at_night_from_the_sky.jpg");
    background-size:cover;
    background-position:center;

    border-bottom:4px double var(--accent-gold);
}

/* ================= LAYOUT ================= */
.container{
    display:flex;
    gap:15px;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    background:rgba(255,255,255,0.9);
    border:3px solid var(--accent-gold);
    border-radius:12px;
    padding:12px;
    height:560px;
    overflow-y:auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.state-item{
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    cursor:pointer;
    background:rgba(255,255,255,0.6);
    transition:0.2s;
}

.state-item:hover{
    background:var(--accent-gold);
    color:white;
}

/* ================= MAP ================= */
.map-box{
    flex:1;
    background:rgba(255,255,255,0.85);
    border:3px solid var(--accent-gold);
    border-radius:12px;
    padding:10px;
}

#map{
    height:560px;
    border-radius:10px;
}

/* ================= POPUP ================= */
.ig-card{
    width:280px;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.ig-img-frame{
    height:150px;
    position:relative;
    overflow:hidden;
    background:black;
}

.ig-img-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
}

.ig-body{ padding:10px; }

.ig-title{ font-weight:bold; }

.ig-scroll{
    text-align:justify;
    font-size:12px;
    max-height:170px;
    overflow:auto;
    margin-top:5px;
    line-height:1.4;
    
}

/* ================= FOOTER ================= */
footer {
            background-color: var(--leather-dark);
            color: #d7ccc8;
            padding: 50px 5% 20px;
            border-top: 4px double var(--accent-gold);
        }

        .copyright {
            text-align: center;
            font-size: 0.8rem;
            color: #8d6e63;
        }
</style>
</head>

// ================= POPUP =================
function createPopup(s){
return `
<div class="ig-card">

<div class="ig-img-frame">
<img src="${s.img}">
</div>

<div class="ig-body">

<div class="ig-title">${s.name}</div>

<div class="ig-scroll">

<strong>Ringkasan:</strong><br>
${s.story}

<br><br>

<strong>Maklumat Lanjut:</strong><br>
${s.moreInfo}

</div>

</div>

</div>`;
}

// ================= MARKERS =================
let markers=[];

function render(data){

markers.forEach(m=>map.removeLayer(m));
markers=[];

data.forEach(s=>{

const marker=L.marker([s.lat,s.lng]).addTo(map);

marker.on('click',()=>{
map.flyTo([s.lat,s.lng],8);

L.popup()
.setLatLng([s.lat,s.lng])
.setContent(createPopup(s))
.openOn(map);
});

markers.push(marker);
});

}

render(states);

// ================= SIDEBAR =================
const stateList=document.getElementById("stateList");

states.forEach(s=>{

const div=document.createElement("div");
div.className="state-item";
div.innerText=s.name;

div.onclick=()=>{
map.flyTo([s.lat,s.lng],8);

L.popup()
.setLatLng([s.lat,s.lng])
.setContent(createPopup(s))
.openOn(map);
};

stateList.appendChild(div);
});

</script>
